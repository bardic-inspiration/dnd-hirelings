<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guild Manager</title>
    <script>
      (function () {
        var palettes = {
          dark:   { bg:'#111114', fg:'#dddde0', border:'#2e2e36', dim:'#5c5c68', dimmer:'#1a1a1f', highlight:'#7eb5f5', highlightBg:'rgba(126,181,245,0.09)', warn:'#e84040', accent:'#d2a24e', backgroundImage:'/assets/UI/background_dark.webp' },
          light:  { bg:'#f4f4f1', fg:'#1e1e22', border:'#c0c0bc', dim:'#888884', dimmer:'#eaeae8', highlight:'#2060d0', highlightBg:'rgba(32,96,208,0.07)',   warn:'#d42020', accent:'#9a6b1e', backgroundImage:'/assets/UI/background_light.webp' },
          vale:   { bg:'#0c1410', fg:'#c5dbbf', border:'#243422', dim:'#4a6248', dimmer:'#131c14', highlight:'#72c87e', highlightBg:'rgba(114,200,126,0.09)', warn:'#e87040', accent:'#6fb0c8', backgroundImage:'/assets/UI/background_vale.webp' },
          ember:  { bg:'#130f0b', fg:'#e8d5bc', border:'#352218', dim:'#624e3a', dimmer:'#1c1510', highlight:'#e8893c', highlightBg:'rgba(232,137,60,0.09)',  warn:'#ffcc00', accent:'#5fb2a8', backgroundImage:'/assets/UI/background_ember.webp' },
          arcane: { bg:'#0d0b14', fg:'#d2cce8', border:'#28203e', dim:'#504865', dimmer:'#141020', highlight:'#9a7ae8', highlightBg:'rgba(154,122,232,0.09)', warn:'#ff6090', accent:'#c9a24e', backgroundImage:'/assets/UI/background_arcane.webp' },
        };
        var name = localStorage.getItem('dnd-hirelings-palette') || 'dark';
        var p = palettes[name] || palettes.dark;
        var r = document.documentElement;
        r.style.setProperty('--bg',           p.bg);
        r.style.setProperty('--fg',           p.fg);
        r.style.setProperty('--border',       p.border);
        r.style.setProperty('--dim',          p.dim);
        r.style.setProperty('--dimmer',       p.dimmer);
        r.style.setProperty('--highlight',    p.highlight);
        r.style.setProperty('--highlight-bg', p.highlightBg);
        r.style.setProperty('--warn',         p.warn);
        r.style.setProperty('--accent',       p.accent);
        if (p.backgroundImage) {
          r.style.setProperty('--bg-image', "url('" + p.backgroundImage + "')");
          var link = document.createElement('link');
          link.rel = 'preload';
          link.as = 'image';
          link.href = p.backgroundImage;
          document.head.appendChild(link);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
