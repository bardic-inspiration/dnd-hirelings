# Clock configuration — game time as the relationship between three layers.
# See docs/architecture.md → "Game Clock & Tick Rollback".

# How in-game minutes (the clock's base unit) roll up into days and years.
calendar:
  minutesPerDay: 1440
  daysPerYear: 364

# Bounds on the per-tick step (days) adjusted by hold-dragging the step buttons.
timeStep:
  min: 1
  max: 364

# Bounds on the play-speed multiplier adjusted by hold-dragging the play button.
rateMultiplier:
  min: 0.1
  max: 100

# Wall-clock pacing: real milliseconds per stepped day, floored at a minimum
# interval between ticks (~60fps).
realTime:
  msPerStepDay: 1000
  minTickIntervalMs: 16
